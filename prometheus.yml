global:
  scrape_interval: 15s      # How often Prometheus pulls metrics
  evaluation_interval: 15s  # How often rules are evaluated

scrape_configs:
  - job_name: "quran-bot"
    metrics_path: "/metrics"
    scrape_timeout: 10s
    static_configs:
      - targets: ["discord-quran-rag-bot.railway.internal:8000"]  # host.docker.internal:8000